name: Rust CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Generate coverage
        run: |
          # Exclude UI/rendering modules from coverage (not unit-testable)
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(main\.rs|app/behavior\.rs|app/terminal_renderer\.rs|app/render\.rs|ui/)'

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage using awk (more portable than grep -P)
          # Exclude UI/rendering modules from coverage (not unit-testable)
          coverage=$(cargo llvm-cov --all-features --workspace --summary-only \
            --ignore-filename-regex '(main\.rs|app/behavior\.rs|app/terminal_renderer\.rs|app/render\.rs|ui/)' \
            | grep 'TOTAL' | awk '{print $4}' | tr -d '%')
          echo "Coverage: ${coverage}%"

          # Check if extraction succeeded
          if [ -z "$coverage" ]; then
            echo "Error: Failed to extract coverage percentage"
            exit 1
          fi

          # Compare using awk (doesn't require bc)
          threshold=50.0
          if awk "BEGIN {exit !($coverage < $threshold)}"; then
            echo "Error: Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi
          echo "Success: Coverage ${coverage}% meets threshold ${threshold}%"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Build (all features)
        run: cargo build --all-features --verbose

      - name: Run tests
        run: cargo test --all-features --verbose
