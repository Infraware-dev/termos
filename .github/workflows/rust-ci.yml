name: Rust CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'terminal-app/**'
  push:
    branches: [main]
    paths:
      - 'terminal-app/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal-app
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal-app
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: terminal-app -> target

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal-app
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: terminal-app -> target

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage using awk (more portable than grep -P)
          coverage=$(cargo llvm-cov --all-features --workspace --summary-only | grep 'TOTAL' | awk '{print $4}' | tr -d '%')
          echo "Coverage: ${coverage}%"

          # Check if extraction succeeded
          if [ -z "$coverage" ]; then
            echo "Error: Failed to extract coverage percentage"
            exit 1
          fi

          # Compare using awk (doesn't require bc)
          threshold=75.0
          if awk "BEGIN {exit !($coverage < $threshold)}"; then
            echo "Error: Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi
          echo "Success: Coverage ${coverage}% meets threshold ${threshold}%"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: terminal-app
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: terminal-app -> target

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
