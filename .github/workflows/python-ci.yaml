name: Python CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  ruff-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff lint
        run: ruff check .

  api-test-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: API test coverage
        run: |
          uv run pytest --cov=src/api --cov-report=term | tee coverage_output.txt
          COVERAGE=$(awk '/TOTAL/ {print $NF}' coverage_output.txt | sed 's/%//')
          echo "API Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            echo "✓ Coverage meets requirement (>= 75%)"
          else
            echo "✗ Coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi

