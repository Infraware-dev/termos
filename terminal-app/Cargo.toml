[package]
name = "infraware-terminal"
version = "0.2.0"
edition = "2021"
license = "MIT"

[lints.rust]
missing_debug_implementations = "warn"
redundant_imports = "warn"
redundant_lifetimes = "warn"
trivial_numeric_casts = "allow"
unsafe_op_in_unsafe_fn = "forbid"
unused_lifetimes = "warn"

[lints.clippy]
all = "warn"
pedantic = "allow"

[dependencies]
# GUI (replacing ratatui/crossterm)
egui = "0.28"
eframe = { version = "0.28", default-features = false, features = ["default_fonts", "glow"] }

# PTY
portable-pty = "0.8"

# Async runtime
tokio = { version = "1.40", features = ["rt-multi-thread", "sync", "time", "macros"] }
async-trait = "0.1"
tokio-util = "0.7"

# LLM client
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"

# Error handling
anyhow = "1.0"

# Logging
log = "0.4"
env_logger = "0.11"

# Utilities
dirs = "6.0"
dotenvy = "0.15"
which = "8.0"
hostname = "0.4"
vte = "0.13"
ctrlc = { version = "3.5.1", features = ["termination"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
strip = true
lto = true
codegen-units = 1
