[package]
name = "infraware-terminal"
version = "0.1.0"
edition = "2021"

[dependencies]
# TUI
ratatui = "0.29"
crossterm = "0.28"

# Async runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"

# Command execution
which = "6.0"
shell-words = "1.1"

# LLM client
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Syntax highlighting
syntect = "5.2"
ansi-to-tui = "7.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Utilities
regex = "1.10"
dirs = "5.0"  # For home directory, config paths
once_cell = "1.19"  # Lazy static initialization for SCAN patterns
strsim = "0.11"  # Levenshtein distance for typo detection

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"  # Performance benchmarking
serial_test = "3.0"  # Fix flaky tests with shared global state

[[bench]]
name = "scan_benchmark"
harness = false
