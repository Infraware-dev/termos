[package]
name = "infraware-terminal"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lints.rust]
missing_debug_implementations = "warn"
redundant_imports = "warn"
redundant_lifetimes = "warn"
trivial_numeric_casts = "allow"  # Animation math requires casts
unsafe_op_in_unsafe_fn = "forbid"
unused_lifetimes = "warn"

[lints.clippy]
all = "warn"
pedantic = "allow"  # Too strict for M1 scope

[dependencies]
# TUI
ratatui = "0.29"
crossterm = "0.29.0"

# Async runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"

# Command execution
which = "8.0.0"
shell-words = "1.1"

# LLM client
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"  # StreamExt for SSE parsing

# Syntax highlighting
syntect = "5.2"
ansi-to-tui = "7.0"

# Error handling
anyhow = "1.0"

# Utilities
regex = "1.10"
dirs = "6.0.0"  # For home directory, config paths
strsim = "0.11"  # Levenshtein distance for typo detection

# Logging
log = "0.4"  # Logging facade
log4rs = { version = "1.3", features = ["gzip"] }  # Size-based log rotation with gzip compression
dotenvy = "0.15"  # .env file loading

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.7.0"  # Performance benchmarking
serial_test = "3.0"  # Fix flaky tests with shared global state

[[bench]]
name = "scan_benchmark"
harness = false

[profile.release]
strip = true          # Strip symbols from binary
lto = true            # Link-time optimization
codegen-units = 1     # Better optimization (slower compile)
