[package]
name = "infraware-terminal"
version = "0.1.0"
edition = "2021"

[dependencies]
# TUI
ratatui = "0.29"
crossterm = "0.28"

# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Command execution
which = "6.0"
shell-words = "1.1"

# LLM client
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Syntax highlighting
syntect = "5.2"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Utilities
regex = "1.10"
dirs = "5.0"  # For home directory, config paths

[dev-dependencies]
tokio-test = "0.4"
