[workspace]
resolver = "2"
members = [
    "crates/shared",
    "crates/backend-api",
    "crates/backend-engine",
    "crates/backend-state",
    "terminal-app",
]

[workspace.package]
version = "0.2.0"
edition = "2024"
license = "MIT"

[workspace.lints.rust]
missing_debug_implementations = "warn"
redundant_imports = "warn"
redundant_lifetimes = "warn"
trivial_numeric_casts = "allow"
unsafe_op_in_unsafe_fn = "forbid"
unused_lifetimes = "warn"

[workspace.lints.clippy]
all = "warn"
pedantic = "allow"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.48", features = ["rt-multi-thread", "sync", "time", "macros", "io-util", "process", "signal"] }
tokio-util = { version = "0.7", features = ["codec"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }
axum = { version = "0.8", features = ["macros"] }
tower = { version = "0.5", features = ["limit"] }
tower-http = { version = "0.6", features = ["cors", "trace", "request-id", "propagate-header"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
async-trait = "0.1"
async-stream = "0.3"
futures = "0.3"
bytes = "1"
anyhow = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
regex = "1"
dotenvy = "0.15"

# AI / LLM
rig-core = "0.28"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
log = "0.4"
env_logger = "0.11"

# OpenAPI / Documentation
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "8", features = ["axum"] }

# Metrics
metrics = "0.24"
metrics-exporter-prometheus = "0.16"

# Internal crates
infraware-shared = { path = "crates/shared" }
infraware-engine = { path = "crates/backend-engine" }
infraware-state = { path = "crates/backend-state" }

[profile.release]
strip = true
lto = true
codegen-units = 1
